<!DOCTYPE html>
<html lang="el">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>GNT Reader — Greek New Testament</title>
<meta name="description" content="A colometric reading edition of the Greek New Testament with sense-line formatting for oral delivery.">
<meta name="theme-color" content="#1c1f24">
<link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,400;0,7..72,700;1,7..72,400&display=swap" rel="stylesheet">
<style>
  :root {
    --line-height: 2.35;
    --wrap-indent: 0.75em;
    --verse-gap: 6px;
    --font-size: 17px;
    --letter-spacing: 0.02em;
    --word-spacing: 0.06em;
    --content-padding: 26px;
    --bg: #1c1f24;
    --bg-raised: #22262d;
    --bg-overlay: rgba(14, 16, 20, 0.97);
    --text: #d4d0c8;
    --text-dim: #8899aa;
    --text-faint: #556;
    --accent: #7cafc2;
    --accent-dim: rgba(124, 175, 194, 0.12);
    --border: rgba(255,255,255,0.06);
    --border-accent: rgba(124, 175, 194, 0.25);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: Literata, Georgia, serif;
    font-size: var(--font-size);
    line-height: var(--line-height);
    max-width: 42em;
    margin: 0 auto;
    padding: 1em;
    padding-top: 50px;
    letter-spacing: var(--letter-spacing);
    word-spacing: var(--word-spacing);
  }

  /* === PROGRESS LINE === */
  .progress-line {
    position: fixed;
    top: 0; left: 0;
    height: 2px;
    background: var(--accent);
    opacity: 0.25;
    z-index: 200;
    width: 0%;
    transition: width 0.15s;
  }

  /* === TOP BAR === */
  .topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    max-width: 42em;
    margin: 0 auto;
    height: 44px;
    background: rgba(28, 31, 36, 0.95);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 14px;
    z-index: 100;
  }

  .topbar-loc {
    display: flex;
    align-items: baseline;
    gap: 6px;
    cursor: pointer;
    padding: 6px 2px;
    border-radius: 6px;
    min-width: 0;
  }
  .topbar-loc:hover { background: rgba(255,255,255,0.04); }

  .topbar-book {
    font-size: 0.84em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  .topbar-chap {
    font-size: 0.84em;
    color: var(--accent);
    font-weight: 600;
    white-space: nowrap;
  }

  .topbar-brand {
    font-size: 0.62em;
    color: var(--text-faint);
    font-weight: 400;
    font-style: italic;
    letter-spacing: 0.03em;
  }

  /* === NAV PANEL === */
  .nav-panel {
    position: fixed;
    inset: 0;
    background: #0e1014;
    z-index: 300;
    display: none;
    flex-direction: column;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .nav-panel.open { display: flex; }

  .nav-panel-header {
    position: sticky;
    top: 0;
    background: #0e1014;
    height: 44px;
    padding: 0 14px;
    display: flex;
    align-items: center;
    gap: 8px;
    z-index: 1;
    border-bottom: 1px solid var(--border);
    max-width: 42em;
    margin: 0 auto;
    width: 100%;
  }

  .nav-panel-close {
    width: 36px;
    height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    font-size: 18px;
  }
  .nav-panel-close:hover { color: var(--text-dim); }

  .nav-panel-title {
    font-size: 0.88em;
    color: var(--text-dim);
    font-weight: 400;
  }

  .nav-panel-body {
    padding: 0 1em 40px;
    max-width: 42em;
    margin: 0 auto;
    width: 100%;
  }

  .nav-book-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 11px 12px;
    border-radius: 8px;
    cursor: pointer;
    color: var(--text-dim);
    font-size: 0.88em;
  }
  .nav-book-row:hover {
    background: rgba(255,255,255,0.025);
    color: var(--text);
  }
  .nav-book-row.active {
    color: var(--accent);
  }
  .nav-book-chaps {
    font-size: 0.72em;
    color: var(--text-faint);
  }

  .nav-ch-grid {
    display: none;
    flex-wrap: wrap;
    gap: 5px;
    padding: 6px 12px 14px;
    border-bottom: 1px solid var(--border);
  }
  .nav-ch-grid.visible { display: flex; }

  .nav-ch {
    width: 34px;
    height: 30px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 6px;
    font-size: 0.72em;
    color: var(--text-faint);
    cursor: pointer;
    background: none;
    border: none;
    font-family: inherit;
  }
  .nav-ch:hover {
    background: rgba(255,255,255,0.06);
    color: var(--text-dim);
  }
  .nav-ch.current {
    color: var(--accent);
    background: var(--accent-dim);
  }

  /* === CONTENT AREA === */
  #content {
    padding: var(--content-padding);
    padding-top: 8px;
  }

  .chapter { margin-bottom: 2em; }

  .verse {
    margin-bottom: var(--verse-gap);
  }

  .verse-num {
    display: block;
    font-size: 0.6em;
    color: var(--text-faint);
    line-height: 1.4;
    margin-top: 0.4em;
    user-select: none;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    letter-spacing: 0.02em;
  }

  .line {
    display: block;
    text-indent: calc(-1 * var(--wrap-indent));
    padding-left: var(--wrap-indent);
  }

  /* === PUNCTUATION (hidden by default — editorial, not original) === */
  .punct {
    display: none;
  }
  body.show-punct .punct {
    display: inline;
    opacity: 0.35;
  }

  /* === CHAPTER NAV BUTTONS === */
  .chapter-nav {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 24px 0 48px;
  }

  .chapter-nav button {
    background: none;
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 10px 20px;
    border-radius: 8px;
    font-family: inherit;
    font-size: 0.82em;
    cursor: pointer;
    transition: all 0.15s;
  }
  .chapter-nav button:hover {
    color: var(--text);
    border-color: var(--border-accent);
    background: var(--accent-dim);
  }
  .chapter-nav button:disabled {
    opacity: 0.2;
    cursor: default;
    background: none;
    border-color: var(--border);
  }

  /* === LOADING === */
  #loading {
    text-align: center;
    color: var(--text-faint);
    padding: 80px 0;
    font-size: 0.88em;
  }

  /* === TOPBAR ICONS === */
  .topbar-icons {
    display: flex;
    gap: 2px;
    align-items: center;
    flex-shrink: 0;
  }

  .topbar-icon {
    width: 34px;
    height: 34px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 8px;
    background: none;
    border: none;
    color: var(--text-faint);
    cursor: pointer;
    transition: color 0.15s, background 0.15s;
  }
  .topbar-icon:hover {
    color: var(--text-dim);
    background: rgba(255,255,255,0.04);
  }
  .topbar-icon svg { width: 16px; height: 16px; fill: currentColor; }

  /* === SETTINGS PANEL === */
  .settings-panel {
    position: fixed;
    top: 45px;
    right: max(calc((100% - 42em) / 2), 14px);
    width: 240px;
    background: var(--bg-raised);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px 16px;
    z-index: 150;
    display: none;
    box-shadow: 0 8px 32px rgba(0,0,0,0.5);
  }
  .settings-panel.open { display: block; }

  .settings-panel label {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 0.78em;
    color: var(--text-dim);
    cursor: pointer;
    padding: 7px 0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }
  .settings-panel label:hover { color: var(--text); }

  .settings-panel input[type="checkbox"] {
    accent-color: var(--accent);
    width: 15px;
    height: 15px;
    cursor: pointer;
  }

  /* === SEARCH SCRIM === */
  .search-scrim {
    position: fixed;
    inset: 0;
    z-index: 240;
    background: rgba(0,0,0,0.45);
    display: none;
  }
  .search-scrim.open { display: block; }

  /* === SEARCH OVERLAY (slide-in panel) === */
  .search-overlay {
    position: fixed;
    top: 0; right: 0; bottom: 0;
    width: 85%;
    max-width: 520px;
    z-index: 250;
    background: #1c1f24;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    transform: translateX(100%);
    transition: transform 0.25s ease;
    box-shadow: -4px 0 20px rgba(0,0,0,0.5);
  }
  .search-overlay.open { transform: translateX(0); }

  .search-header {
    position: sticky;
    top: 0;
    z-index: 1;
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 14px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
  }

  .search-back {
    background: none;
    border: none;
    color: var(--text);
    font-size: 1.3em;
    cursor: pointer;
    padding: 4px;
  }

  .search-header input {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 1em;
    padding: 2px 0;
  }
  .search-header input::placeholder { color: #666; }

  .search-close {
    background: none;
    border: none;
    color: #888;
    font-size: 1.3em;
    cursor: pointer;
    padding: 4px;
  }

  .search-body {
    padding: 16px;
  }

  .search-status {
    color: #999;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 0.8em;
    margin-bottom: 10px;
  }

  .search-result {
    display: block;
    padding: 10px 0;
    cursor: pointer;
    border-bottom: 1px solid rgba(255,255,255,0.06);
    text-decoration: none;
    color: inherit;
  }
  .search-result:hover { background: rgba(255,255,255,0.03); }

  .search-result-ref {
    font-size: 0.75em;
    color: var(--accent);
    font-weight: 600;
    margin-bottom: 3px;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  .search-result-text {
    font-size: 0.85em;
    color: var(--text-dim);
    line-height: 1.5;
  }

  .search-result-text mark {
    background: rgba(124, 175, 194, 0.25);
    color: var(--text);
    border-radius: 2px;
    padding: 0 1px;
  }

  /* === SEARCH OPERATOR BUTTONS === */
  .search-ops {
    display: flex;
    gap: 6px;
    padding: 8px 14px;
    background: #2a2a2a;
    border-bottom: 1px solid #444;
    flex-wrap: wrap;
  }

  .search-op {
    padding: 3px 10px;
    border-radius: 4px;
    background: rgba(255,255,255,0.06);
    color: var(--text-faint);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 0.72em;
    cursor: pointer;
    user-select: none;
    letter-spacing: 0.03em;
    transition: background 0.15s, color 0.15s;
  }
  .search-op:hover {
    background: rgba(255,255,255,0.1);
    color: var(--text-dim);
  }

  .search-loading {
    text-align: center;
    color: var(--text-faint);
    padding: 30px 0;
    font-size: 0.85em;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  }

  /* === VERSE NUMBER VISIBILITY === */
  body.hide-verse-nums .verse-num { display: none; }

  @media (max-width: 480px) {
    body { padding: 0.5em; padding-top: 50px; }
    #content { padding: 16px; padding-top: 8px; }
    .nav-book-row { padding: 10px 8px; font-size: 0.82em; }
    .settings-panel { right: 8px; }
  }
</style>
</head>
<body>

<!-- Progress line -->
<div class="progress-line" id="progress-line"></div>

<!-- Top bar -->
<div class="topbar">
  <div class="topbar-loc" id="topbar-loc" onclick="openNav()">
    <span class="topbar-book" id="topbar-book">Mark</span>
    <span class="topbar-chap" id="topbar-chap">1</span>
  </div>
  <div class="topbar-icons">
    <span class="topbar-brand">GNT Reader</span>
    <button class="topbar-icon" id="btn-search" onclick="toggleSearch()" aria-label="Search" title="Search (Ctrl+F)">
      <svg viewBox="0 0 24 24"><path d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
    </button>
    <button class="topbar-icon" id="btn-settings" onclick="toggleSettings()" aria-label="Settings" title="Settings">
      <svg viewBox="0 0 24 24"><path d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58a.49.49 0 00.12-.61l-1.92-3.32a.49.49 0 00-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54a.48.48 0 00-.48-.41h-3.84a.48.48 0 00-.48.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96a.49.49 0 00-.59.22L2.74 8.87a.48.48 0 00.12.61l2.03 1.58c-.05.3-.07.62-.07.94s.02.64.07.94l-2.03 1.58a.49.49 0 00-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.26.41.48.41h3.84c.24 0 .44-.17.48-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6A3.6 3.6 0 1115.6 12 3.61 3.61 0 0112 15.6z"/></svg>
    </button>
  </div>
</div>

<!-- Settings panel -->
<div class="settings-panel" id="settings-panel">
  <label><input type="checkbox" id="setting-punct" onchange="togglePunct(this.checked)"> Show punctuation</label>
  <label><input type="checkbox" id="setting-verses" checked onchange="toggleVerseNums(this.checked)"> Show verse numbers</label>
</div>

<!-- Search scrim + panel -->
<div class="search-scrim" id="search-scrim" onclick="closeSearch()"></div>
<div class="search-overlay" id="search-overlay">
  <div class="search-header">
    <button class="search-back" onclick="closeSearch()">&#8592;</button>
    <input type="text" id="search-input" placeholder="Search Greek text..." autocomplete="off" spellcheck="false">
    <button class="search-close" onclick="closeSearch()">&#10005;</button>
  </div>
  <div class="search-ops">
    <span class="search-op" onclick="insertSearchOp(' AND ')">AND</span>
    <span class="search-op" onclick="insertSearchOp(' OR ')">OR</span>
    <span class="search-op" onclick="insertSearchOp(' NOT ')">NOT</span>
    <span class="search-op" onclick="insertSearchOp('(', ')')">( )</span>
    <span class="search-op" onclick="insertSearchOp('&quot;', '&quot;')">&quot; &quot;</span>
    <span class="search-op" onclick="insertSearchOp(' NEAR5 ')">NEAR</span>
  </div>
  <div class="search-body">
    <div class="search-status" id="search-status"></div>
    <div id="search-results"></div>
  </div>
</div>

<!-- Nav panel -->
<div class="nav-panel" id="nav-panel">
  <div class="nav-panel-header">
    <button class="nav-panel-close" onclick="closeNav()">&times;</button>
    <span class="nav-panel-title">Greek New Testament</span>
  </div>
  <div class="nav-panel-body" id="nav-body"></div>
</div>

<!-- Main content -->
<div id="content">
  <div id="loading">Loading...</div>
  <div id="text-container"></div>
  <div class="chapter-nav">
    <button id="btn-prev" onclick="goChapter(-1)">&larr; Previous</button>
    <button id="btn-next" onclick="goChapter(1)">Next &rarr;</button>
  </div>
</div>

<script>
const BOOKS = {
  'matt': { name: 'Matthew', chapters: 28 },
  'mark': { name: 'Mark', chapters: 16 },
  'luke': { name: 'Luke', chapters: 24 },
  'john': { name: 'John', chapters: 21 },
  'acts': { name: 'Acts', chapters: 28 },
  'rom': { name: 'Romans', chapters: 16 },
  '1cor': { name: '1 Corinthians', chapters: 16 },
  '2cor': { name: '2 Corinthians', chapters: 13 },
  'gal': { name: 'Galatians', chapters: 6 },
  'eph': { name: 'Ephesians', chapters: 6 },
  'phil': { name: 'Philippians', chapters: 4 },
  'col': { name: 'Colossians', chapters: 4 },
  '1thess': { name: '1 Thessalonians', chapters: 5 },
  '2thess': { name: '2 Thessalonians', chapters: 3 },
  '1tim': { name: '1 Timothy', chapters: 6 },
  '2tim': { name: '2 Timothy', chapters: 4 },
  'titus': { name: 'Titus', chapters: 3 },
  'phlm': { name: 'Philemon', chapters: 1 },
  'heb': { name: 'Hebrews', chapters: 13 },
  'jas': { name: 'James', chapters: 5 },
  '1pet': { name: '1 Peter', chapters: 5 },
  '2pet': { name: '2 Peter', chapters: 3 },
  '1john': { name: '1 John', chapters: 5 },
  '2john': { name: '2 John', chapters: 1 },
  '3john': { name: '3 John', chapters: 1 },
  'jude': { name: 'Jude', chapters: 1 },
  'rev': { name: 'Revelation', chapters: 22 },
};

const BOOK_KEYS = Object.keys(BOOKS);
let currentBook = 'mark';
let currentChapter = 1;
let bookCache = {};
let expandedBook = null;

// --- Hash routing ---

function parseHash() {
  const hash = location.hash.replace('#', '');
  if (!hash) return { book: 'mark', chapter: 1, verse: null };
  const parts = hash.split('-');
  // Try 3-part: book-chapter-verse (e.g., acts-2-38)
  // Or 2-part: book-chapter (e.g., acts-2)
  // Books with numeric prefixes: 1cor-3, 2tim-4-1
  if (parts.length >= 3) {
    // Could be book-ch-verse OR numbook-ch (like 1cor-3)
    const lastNum = parseInt(parts[parts.length - 1], 10);
    const secondLastNum = parseInt(parts[parts.length - 2], 10);
    const bookCandidate2 = parts.slice(0, -2).join('-');
    const bookCandidate1 = parts.slice(0, -1).join('-');

    // Try book-ch-verse first
    if (BOOKS[bookCandidate2] && secondLastNum >= 1 && secondLastNum <= BOOKS[bookCandidate2].chapters) {
      return { book: bookCandidate2, chapter: secondLastNum, verse: lastNum };
    }
    // Fall back to book-ch (e.g., 1cor-3)
    if (BOOKS[bookCandidate1] && lastNum >= 1 && lastNum <= BOOKS[bookCandidate1].chapters) {
      return { book: bookCandidate1, chapter: lastNum, verse: null };
    }
  }
  if (parts.length >= 2) {
    const ch = parseInt(parts[parts.length - 1], 10);
    const book = parts.slice(0, -1).join('-');
    if (BOOKS[book] && ch >= 1 && ch <= BOOKS[book].chapters) {
      return { book, chapter: ch, verse: null };
    }
  }
  return { book: 'mark', chapter: 1, verse: null };
}

function setHash(book, chapter, verse) {
  if (verse) {
    location.hash = book + '-' + chapter + '-' + verse;
  } else {
    location.hash = book + '-' + chapter;
  }
}

// --- Topbar ---

function updateTopbar() {
  document.getElementById('topbar-book').textContent = BOOKS[currentBook].name;
  document.getElementById('topbar-chap').textContent = currentChapter;
  document.title = BOOKS[currentBook].name + ' ' + currentChapter + ' — GNT Reader';
}

// --- Progress line ---

function updateProgress() {
  const scrollTop = window.scrollY;
  const docHeight = document.documentElement.scrollHeight - window.innerHeight;
  const pct = docHeight > 0 ? (scrollTop / docHeight) * 100 : 0;
  document.getElementById('progress-line').style.width = pct + '%';
}

// --- Navigation ---

async function navigate(book, chapter, verse) {
  currentBook = book;
  currentChapter = chapter;
  setHash(book, chapter, verse);
  updateTopbar();
  updateNavButtons();
  await loadBook(book);
  if (verse) {
    scrollToVerse(chapter, verse);
  } else {
    scrollToChapter(chapter);
  }
}

async function loadBook(slug) {
  const container = document.getElementById('text-container');
  const loading = document.getElementById('loading');

  if (bookCache[slug]) {
    container.innerHTML = bookCache[slug];
    return;
  }

  loading.style.display = 'block';
  container.innerHTML = '';

  try {
    const resp = await fetch('books/' + slug + '.html');
    if (!resp.ok) throw new Error('Not found');
    const html = await resp.text();
    bookCache[slug] = html;
    container.innerHTML = html;
  } catch (e) {
    container.innerHTML = '<p style="color:var(--text-faint);text-align:center;padding:60px 0;">Could not load ' + BOOKS[slug].name + '.</p>';
  } finally {
    loading.style.display = 'none';
  }
}

function scrollToChapter(ch) {
  const el = document.getElementById('ch-' + ch);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 56;
    window.scrollTo({ top: y, behavior: 'auto' });
  } else {
    window.scrollTo({ top: 0, behavior: 'auto' });
  }
}

function scrollToVerse(ch, verse) {
  const el = document.getElementById('v-' + ch + '-' + verse);
  if (el) {
    const y = el.getBoundingClientRect().top + window.scrollY - 56;
    window.scrollTo({ top: y, behavior: 'auto' });
  } else {
    scrollToChapter(ch);
  }
}

function goChapter(delta) {
  let newCh = currentChapter + delta;
  let newBook = currentBook;

  if (newCh < 1) {
    const idx = BOOK_KEYS.indexOf(currentBook);
    if (idx <= 0) return;
    newBook = BOOK_KEYS[idx - 1];
    newCh = BOOKS[newBook].chapters;
  } else if (newCh > BOOKS[currentBook].chapters) {
    const idx = BOOK_KEYS.indexOf(currentBook);
    if (idx >= BOOK_KEYS.length - 1) return;
    newBook = BOOK_KEYS[idx + 1];
    newCh = 1;
  }

  navigate(newBook, newCh);
}

function updateNavButtons() {
  const idx = BOOK_KEYS.indexOf(currentBook);
  document.getElementById('btn-prev').disabled = (idx === 0 && currentChapter === 1);
  document.getElementById('btn-next').disabled = (idx === BOOK_KEYS.length - 1 && currentChapter === BOOKS[currentBook].chapters);
}

// --- Nav panel (BOM Reader style) ---

function openNav() {
  buildNavPanel();
  document.getElementById('nav-panel').classList.add('open');
}

function closeNav() {
  document.getElementById('nav-panel').classList.remove('open');
}

function buildNavPanel() {
  const body = document.getElementById('nav-body');
  body.innerHTML = '';

  for (const slug of BOOK_KEYS) {
    const book = BOOKS[slug];
    const isActive = (slug === currentBook);

    // Book row
    const row = document.createElement('div');
    row.className = 'nav-book-row' + (isActive ? ' active' : '');
    row.innerHTML = '<span>' + book.name + '</span><span class="nav-book-chaps">' + book.chapters + ' ch</span>';
    row.onclick = () => toggleBookChapters(slug);
    body.appendChild(row);

    // Chapter grid
    const grid = document.createElement('div');
    grid.className = 'nav-ch-grid';
    grid.id = 'nav-grid-' + slug;

    if (book.chapters === 1) {
      row.onclick = () => { closeNav(); navigate(slug, 1); };
    } else {
      for (let i = 1; i <= book.chapters; i++) {
        const ch = document.createElement('button');
        ch.className = 'nav-ch' + (isActive && i === currentChapter ? ' current' : '');
        ch.textContent = i;
        ch.onclick = ((s, c) => () => { closeNav(); navigate(s, c); })(slug, i);
        grid.appendChild(ch);
      }
    }

    body.appendChild(grid);

    // Auto-expand current book
    if (isActive && book.chapters > 1) {
      grid.classList.add('visible');
      expandedBook = slug;
    }
  }
}

function toggleBookChapters(slug) {
  if (BOOKS[slug].chapters === 1) return;

  const grid = document.getElementById('nav-grid-' + slug);
  if (!grid) return;

  if (expandedBook && expandedBook !== slug) {
    const prev = document.getElementById('nav-grid-' + expandedBook);
    if (prev) prev.classList.remove('visible');
  }

  grid.classList.toggle('visible');
  expandedBook = grid.classList.contains('visible') ? slug : null;
}

// --- Settings ---

function toggleSettings() {
  const panel = document.getElementById('settings-panel');
  panel.classList.toggle('open');
  // Close search if open
  if (panel.classList.contains('open')) closeSearch();
}

function closeSettings() {
  document.getElementById('settings-panel').classList.remove('open');
}

function togglePunct(on) {
  document.body.classList.toggle('show-punct', on);
  localStorage.setItem('gnt-show-punct', on ? '1' : '0');
}

function toggleVerseNums(on) {
  document.body.classList.toggle('hide-verse-nums', !on);
  localStorage.setItem('gnt-show-verses', on ? '1' : '0');
}

function loadSettings() {
  const punct = localStorage.getItem('gnt-show-punct') === '1';
  const verses = localStorage.getItem('gnt-show-verses') !== '0'; // default ON
  document.getElementById('setting-punct').checked = punct;
  document.getElementById('setting-verses').checked = verses;
  document.body.classList.toggle('show-punct', punct);
  document.body.classList.toggle('hide-verse-nums', !verses);
}

// --- Search (Boolean query parser + cross-book index) ---

let searchTimeout = null;
let searchIndex = null;    // Array of { book, bookName, chapter, verse, text }
let searchIndexLoading = false;
let lastSearchTerms = [];  // for highlighting

function stripDiacritics(str) {
  return str.normalize('NFD').replace(/[\u0300-\u036f]/g, '').toLowerCase();
}

function escapeHtml(str) {
  return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

// --- Search index: fetch all 27 book HTML files, extract verses ---

async function buildSearchIndex() {
  if (searchIndex) return;
  if (searchIndexLoading) return;
  searchIndexLoading = true;

  const statusEl = document.getElementById('search-status');
  statusEl.innerHTML = '<div class="search-loading">Building search index...</div>';

  const index = [];
  const parser = new DOMParser();

  for (const slug of BOOK_KEYS) {
    try {
      let html;
      if (bookCache[slug]) {
        html = bookCache[slug];
      } else {
        const resp = await fetch('books/' + slug + '.html');
        if (!resp.ok) continue;
        html = await resp.text();
        bookCache[slug] = html;
      }

      const doc = parser.parseFromString('<div>' + html + '</div>', 'text/html');
      const verses = doc.querySelectorAll('.verse');

      for (const verse of verses) {
        const id = verse.id || '';
        const m = id.match(/^v-(\d+)-(\d+)$/);
        if (!m) continue;

        const ch = parseInt(m[1]);
        const vNum = parseInt(m[2]);

        // Get all line text, join with space, strip punctuation spans
        const lines = verse.querySelectorAll('.line');
        let text = '';
        for (const line of lines) {
          // Clone and remove .punct spans to get clean text
          const clone = line.cloneNode(true);
          const puncts = clone.querySelectorAll('.punct');
          for (const p of puncts) p.remove();
          text += (text ? ' ' : '') + clone.textContent.trim();
        }

        if (text) {
          index.push({
            book: slug,
            bookName: BOOKS[slug].name,
            chapter: ch,
            verse: vNum,
            text: text,
            textStripped: stripDiacritics(text)
          });
        }
      }
    } catch (e) {
      console.error('Failed to index ' + slug, e);
    }
  }

  searchIndex = index;
  searchIndexLoading = false;
  statusEl.textContent = '';
}

// --- Insert operator at cursor ---

function insertSearchOp(before, after) {
  const input = document.getElementById('search-input');
  input.focus();
  const start = input.selectionStart;
  const end = input.selectionEnd;
  const val = input.value;
  if (after) {
    const selected = val.substring(start, end);
    const insert = before + selected + after;
    input.value = val.substring(0, start) + insert + val.substring(end);
    if (selected.length > 0) {
      input.selectionStart = input.selectionEnd = start + insert.length;
    } else {
      input.selectionStart = input.selectionEnd = start + before.length;
    }
  } else {
    input.value = val.substring(0, start) + before + val.substring(end);
    input.selectionStart = input.selectionEnd = start + before.length;
  }
  input.dispatchEvent(new Event('input'));
}

// --- Toggle / Open / Close ---

function toggleSearch() {
  const overlay = document.getElementById('search-overlay');
  if (overlay.classList.contains('open')) {
    closeSearch();
  } else {
    openSearch();
  }
}

function openSearch() {
  closeSettings();
  document.getElementById('search-scrim').classList.add('open');
  document.getElementById('search-overlay').classList.add('open');
  const input = document.getElementById('search-input');
  input.value = '';
  input.focus();
  document.getElementById('search-status').textContent = '';
  document.getElementById('search-results').innerHTML = '';
  // Build index on first open
  if (!searchIndex && !searchIndexLoading) {
    buildSearchIndex();
  }
}

function closeSearch() {
  document.getElementById('search-overlay').classList.remove('open');
  document.getElementById('search-scrim').classList.remove('open');
  document.getElementById('search-input').blur();
}

// --- Boolean query detection ---

function hasBooleanOps(query) {
  return /\b(AND|OR|NOT|NEAR\d+)\b/.test(query) || /[()]/.test(query);
}

// --- Word splitting (strips Greek punctuation for word-position matching) ---

function getWords(text) {
  // Strip punctuation but keep Greek letters and spaces
  return text.replace(/[^\p{L}\p{N}\s]/gu, '').split(/\s+/).filter(w => w.length > 0);
}

// --- Term matching helpers (diacritic-stripped) ---

function termWordPositions(term, verseTextStripped) {
  const words = getWords(verseTextStripped);

  if (term.charAt(0) === '"' && term.charAt(term.length - 1) === '"') {
    // Exact phrase
    const phrase = stripDiacritics(term.slice(1, -1)).split(/\s+/).filter(w => w);
    const positions = [];
    for (let i = 0; i <= words.length - phrase.length; i++) {
      let match = true;
      for (let p = 0; p < phrase.length; p++) {
        if (words[i + p] !== phrase[p]) { match = false; break; }
      }
      if (match) positions.push(i);
    }
    return positions;
  } else {
    // Single word
    const stripped = stripDiacritics(term);
    const positions = [];
    for (let i = 0; i < words.length; i++) {
      if (words[i] === stripped) positions.push(i);
    }
    return positions;
  }
}

function nearMatch(term1, term2, distance, verseTextStripped) {
  const pos1 = termWordPositions(term1, verseTextStripped);
  const pos2 = termWordPositions(term2, verseTextStripped);
  for (let i = 0; i < pos1.length; i++) {
    for (let j = 0; j < pos2.length; j++) {
      if (Math.abs(pos1[i] - pos2[j]) <= distance) return true;
    }
  }
  return false;
}

function termMatchesVerse(term, verseTextStripped) {
  if (term.charAt(0) === '"' && term.charAt(term.length - 1) === '"') {
    const phrase = stripDiacritics(term.slice(1, -1));
    return verseTextStripped.indexOf(phrase) !== -1;
  }
  // Single word: strip diacritics and match as substring bounded by non-letter
  const stripped = stripDiacritics(term);
  // Use word-boundary-like matching for Greek (match whole words)
  const words = getWords(verseTextStripped);
  for (let i = 0; i < words.length; i++) {
    if (words[i] === stripped) return true;
  }
  return false;
}

// --- Recursive descent Boolean query parser ---

function parseBooleanQuery(query) {
  const tokens = [];
  const re = /"[^"]*"|\bAND\b|\bOR\b|\bNOT\b|\bNEAR\d+\b|[()]|[^\s()]+/g;
  let m;
  while ((m = re.exec(query)) !== null) {
    tokens.push(m[0]);
  }

  // Collect all non-operator terms for highlighting
  const highlightTerms = [];
  for (let i = 0; i < tokens.length; i++) {
    const tok = tokens[i];
    if (tok !== 'AND' && tok !== 'OR' && tok !== 'NOT' && tok !== '(' && tok !== ')' && !/^NEAR\d+$/.test(tok)) {
      if (tok.charAt(0) === '"' && tok.charAt(tok.length - 1) === '"') {
        highlightTerms.push(stripDiacritics(tok.slice(1, -1)));
      } else {
        highlightTerms.push(stripDiacritics(tok));
      }
    }
  }

  let pos = 0;
  let lastNearTerm = '';

  function parseOr() {
    let left = parseAnd();
    while (pos < tokens.length && tokens[pos] === 'OR') {
      pos++;
      const right = parseAnd();
      left = ((l, r) => (v => l(v) || r(v)))(left, right);
    }
    return left;
  }

  function parseAnd() {
    let left = parseNot();
    while (pos < tokens.length && (tokens[pos] === 'AND' || /^NEAR\d+$/.test(tokens[pos]))) {
      const op = tokens[pos];
      pos++;
      if (/^NEAR\d+$/.test(op)) {
        const dist = parseInt(op.replace('NEAR', ''), 10);
        const leftTerm = lastNearTerm;
        const rightNode = parseNot();
        const rightTerm = lastNearTerm;
        left = ((lt, rt, d) => (v => nearMatch(lt, rt, d, v)))(leftTerm, rightTerm, dist);
      } else {
        const right = parseNot();
        left = ((l, r) => (v => l(v) && r(v)))(left, right);
      }
    }
    // Implicit AND: adjacent terms with no operator
    while (pos < tokens.length && tokens[pos] !== 'OR' && tokens[pos] !== 'AND' && tokens[pos] !== ')' && !/^NEAR\d+$/.test(tokens[pos])) {
      const right = parseNot();
      left = ((l, r) => (v => l(v) && r(v)))(left, right);
    }
    return left;
  }

  function parseNot() {
    if (pos < tokens.length && tokens[pos] === 'NOT') {
      pos++;
      const inner = parseTerm();
      return (fn => (v => !fn(v)))(inner);
    }
    return parseTerm();
  }

  function parseTerm() {
    if (pos >= tokens.length) return () => false;
    const tok = tokens[pos];
    if (tok === '(') {
      pos++;
      const inner = parseOr();
      if (pos < tokens.length && tokens[pos] === ')') pos++;
      return inner;
    }
    pos++;
    lastNearTerm = tok;
    return (verseText) => termMatchesVerse(tok, verseText);
  }

  const matcher = parseOr();
  return { matcher, highlightTerms };
}

// --- Main search function ---

function performSearch(query) {
  const statusEl = document.getElementById('search-status');
  const resultsEl = document.getElementById('search-results');

  if (!query || query.trim().length < 2) {
    statusEl.textContent = '';
    resultsEl.innerHTML = '';
    lastSearchTerms = [];
    return;
  }

  if (!searchIndex) {
    statusEl.innerHTML = '<div class="search-loading">Building search index...</div>';
    // Retry after index loads
    const checkInterval = setInterval(() => {
      if (searchIndex) {
        clearInterval(checkInterval);
        performSearch(query);
      }
    }, 200);
    return;
  }

  statusEl.textContent = 'Searching...';
  resultsEl.innerHTML = '';

  const isBoolean = hasBooleanOps(query);
  const isExact = /^".*"$/.test(query.trim());
  let boolMatcher = null;

  if (isBoolean) {
    const parsed = parseBooleanQuery(query);
    boolMatcher = parsed.matcher;
    lastSearchTerms = parsed.highlightTerms;
  } else if (isExact) {
    const exact = stripDiacritics(query.trim().replace(/^"|"$/g, ''));
    lastSearchTerms = [exact];
  } else {
    // Simple search: split into words, each must match (implicit AND)
    const words = query.trim().split(/\s+/).filter(w => w.length > 0);
    lastSearchTerms = words.map(w => stripDiacritics(w));
  }

  const hits = [];

  for (const entry of searchIndex) {
    let matched = false;

    if (boolMatcher) {
      matched = boolMatcher(entry.textStripped);
    } else if (isExact) {
      const phrase = stripDiacritics(query.trim().replace(/^"|"$/g, ''));
      matched = entry.textStripped.indexOf(phrase) !== -1;
    } else {
      // All terms must appear (implicit AND for multi-word)
      matched = true;
      for (const term of lastSearchTerms) {
        const words = getWords(entry.textStripped);
        let found = false;
        for (const w of words) {
          if (w === term) { found = true; break; }
        }
        if (!found) { matched = false; break; }
      }
    }

    if (matched) {
      hits.push(entry);
    }
  }

  // Display results
  const totalCount = hits.length;
  const displayLimit = 100;

  if (totalCount === 0) {
    statusEl.textContent = 'No results found.';
    return;
  }

  statusEl.textContent = totalCount + ' verse' + (totalCount !== 1 ? 's' : '') + ' found';

  const shown = Math.min(totalCount, displayLimit);
  for (let i = 0; i < shown; i++) {
    const entry = hits[i];
    const ref = entry.bookName + ' ' + entry.chapter + ':' + entry.verse;

    const card = document.createElement('div');
    card.className = 'search-result';

    const refDiv = document.createElement('div');
    refDiv.className = 'search-result-ref';
    refDiv.textContent = ref;

    const textDiv = document.createElement('div');
    textDiv.className = 'search-result-text';
    textDiv.innerHTML = highlightSearchResult(entry.text, lastSearchTerms);

    card.appendChild(refDiv);
    card.appendChild(textDiv);

    ((book, ch, v) => {
      card.onclick = () => {
        closeSearch();
        navigate(book, ch, v);
      };
    })(entry.book, entry.chapter, entry.verse);

    resultsEl.appendChild(card);
  }

  if (totalCount > displayLimit) {
    const more = document.createElement('div');
    more.style.cssText = 'color:var(--text-faint); text-align:center; padding:20px 0; font-size:0.85em;';
    more.textContent = (totalCount - displayLimit) + ' more results...';
    resultsEl.appendChild(more);
  }
}

// --- Highlight matching terms in verse text ---

function highlightSearchResult(originalText, terms) {
  if (!terms || terms.length === 0) return escapeHtml(originalText);

  // Build NFD mapping for diacritic-aware highlighting
  const nfd = originalText.normalize('NFD');
  const strippedChars = [];
  const origIndices = [];

  for (let i = 0; i < nfd.length; i++) {
    const code = nfd.charCodeAt(i);
    if (code >= 0x0300 && code <= 0x036f) continue;
    strippedChars.push(nfd[i].toLowerCase());
    origIndices.push(i);
  }

  const strippedStr = strippedChars.join('');

  // Find all match ranges in the stripped string
  const ranges = [];
  for (const term of terms) {
    let idx = 0;
    while (idx <= strippedStr.length - term.length) {
      const found = strippedStr.indexOf(term, idx);
      if (found === -1) break;
      ranges.push([found, found + term.length]);
      idx = found + 1;
    }
  }

  if (ranges.length === 0) return escapeHtml(originalText);

  // Merge overlapping ranges
  ranges.sort((a, b) => a[0] - b[0]);
  const merged = [ranges[0]];
  for (let i = 1; i < ranges.length; i++) {
    const last = merged[merged.length - 1];
    if (ranges[i][0] <= last[1]) {
      last[1] = Math.max(last[1], ranges[i][1]);
    } else {
      merged.push(ranges[i]);
    }
  }

  // Map stripped indices back to NFD indices, build output
  let result = '';
  let prevEnd = 0;

  for (const [start, end] of merged) {
    const nfdStart = origIndices[start];
    const nfdEnd = (end < origIndices.length) ? origIndices[end] : nfd.length;

    const before = nfd.slice(prevEnd === 0 ? 0 : (origIndices[prevEnd] || nfd.length), nfdStart).normalize('NFC');
    const matched = nfd.slice(nfdStart, nfdEnd).normalize('NFC');

    if (prevEnd === 0) {
      result += escapeHtml(nfd.slice(0, nfdStart).normalize('NFC'));
    } else {
      result += escapeHtml(before);
    }
    result += '<mark>' + escapeHtml(matched) + '</mark>';
    prevEnd = end;
  }

  // Append remainder
  const lastNfdEnd = (prevEnd < origIndices.length) ? origIndices[prevEnd] : nfd.length;
  result += escapeHtml(nfd.slice(lastNfdEnd).normalize('NFC'));

  return result;
}

// --- Keyboard Shortcuts ---

document.addEventListener('keydown', function(e) {
  // Ctrl+F or / opens search
  if ((e.ctrlKey && e.key === 'f') || (e.key === '/' && !e.ctrlKey && !e.altKey && !e.metaKey)) {
    // Don't intercept / if already typing in an input
    if (e.key === '/' && (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA')) return;
    e.preventDefault();
    openSearch();
    return;
  }

  // Escape closes search or settings
  if (e.key === 'Escape') {
    const searchOverlay = document.getElementById('search-overlay');
    if (searchOverlay.classList.contains('open')) {
      closeSearch();
      return;
    }
    const settingsPanel = document.getElementById('settings-panel');
    if (settingsPanel.classList.contains('open')) {
      closeSettings();
      return;
    }
  }
});

// Search input handler with debounce
document.getElementById('search-input').addEventListener('input', function(e) {
  clearTimeout(searchTimeout);
  searchTimeout = setTimeout(() => performSearch(e.target.value), 200);
});

// Close settings when clicking outside
document.addEventListener('click', function(e) {
  const panel = document.getElementById('settings-panel');
  const btn = document.getElementById('btn-settings');
  if (panel.classList.contains('open') && !panel.contains(e.target) && !btn.contains(e.target)) {
    closeSettings();
  }
});

// --- Init ---

window.addEventListener('scroll', updateProgress, { passive: true });

window.addEventListener('hashchange', () => {
  const { book, chapter, verse } = parseHash();
  if (book !== currentBook || chapter !== currentChapter || verse) {
    navigate(book, chapter, verse);
  }
});

(function init() {
  loadSettings();
  const { book, chapter, verse } = parseHash();
  navigate(book, chapter, verse);
})();
</script>
